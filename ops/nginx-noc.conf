# Live copy of /etc/nginx/conf.d/noc.conf on the VPS (77.42.66.76), kept here for
# disaster-recovery + review. Edited on the server directly (not deployed by CI);
# if you change it here, copy it up and `nginx -t && systemctl reload nginx`.
#
# Notes:
# - Both apex :80 blocks serve /.well-known/acme-challenge/ from CWP's ACME webroot
#   (/usr/local/apache/autossl_tmp) BEFORE redirecting to HTTPS — REQUIRED for Let's
#   Encrypt HTTP-01 renewal (the certbot *nginx* authenticator does NOT work on this
#   CWP box). The cert renews via `authenticator = webroot` + `renew_hook = systemctl
#   reload nginx` (see /etc/letsencrypt/renewal/newobour.com.conf).
# - One SAN cert (/etc/letsencrypt/live/newobour.com/) covers all four names:
#   newobour.com, www.newobour.com, alsawarey.com, www.alsawarey.com.
# - www.* → apex 301 blocks use that cert, so `www` is safe to proxy through Cloudflare
#   under Full (strict), or leave grey / edge-redirect — all work.

# --- newobour.com -> portal :3001 ---
server {
    listen 77.42.66.76:80;
    server_name newobour.com;
    location /.well-known/acme-challenge/ { alias /usr/local/apache/autossl_tmp/.well-known/acme-challenge/; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 77.42.66.76:443 ssl;
    server_name newobour.com;
    ssl_certificate     /etc/letsencrypt/live/newobour.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newobour.com/privkey.pem;
    client_max_body_size 35m;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# --- alsawarey.com -> brokerage :3002 ---
server {
    listen 77.42.66.76:80;
    server_name alsawarey.com;
    location /.well-known/acme-challenge/ { alias /usr/local/apache/autossl_tmp/.well-known/acme-challenge/; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 77.42.66.76:443 ssl;
    server_name alsawarey.com;
    ssl_certificate     /etc/letsencrypt/live/newobour.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newobour.com/privkey.pem;
    client_max_body_size 35m;
    location /uploads {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# --- www.* -> apex (our SAN cert covers www; ACME served on :80 for renewals) ---
server {
    listen 77.42.66.76:80;
    server_name www.newobour.com www.alsawarey.com;
    location /.well-known/acme-challenge/ { alias /usr/local/apache/autossl_tmp/.well-known/acme-challenge/; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 77.42.66.76:443 ssl;
    server_name www.newobour.com;
    ssl_certificate     /etc/letsencrypt/live/newobour.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newobour.com/privkey.pem;
    return 301 https://newobour.com$request_uri;
}
server {
    listen 77.42.66.76:443 ssl;
    server_name www.alsawarey.com;
    ssl_certificate     /etc/letsencrypt/live/newobour.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newobour.com/privkey.pem;
    return 301 https://alsawarey.com$request_uri;
}
